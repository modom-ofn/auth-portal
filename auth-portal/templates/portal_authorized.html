<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AuthPortal — Authorized</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/authportal-logo.svg">
  <link rel="icon" type="image/x-icon" href="/static/authportal-logo.ico">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg {{.HeroBackgroundMode}}" style="--portal-bg-color: {{.HeroBackgroundColor}};">
  <main class="center">
    <section class="card {{.PortalCardMode}}" style="--portal-card-color: {{.PortalCardColor}};">
      <div class="brand">
        <img src="/static/authportal-logo.svg" alt="AuthPortal" class="logo">
        <h1>Welcome, {{ .Username }}</h1>
        <p class="muted">You are authorized on this server.</p>
      </div>

      <div class="portal-service-links">
        {{- range .ServiceLinks }}
        {{- if .Color }}
        <a class="primary-btn portal-service-btn" style="background:{{ .Color }};border-color:{{ .Color }};color:{{ .TextColor }};" href="{{ .URL }}">{{ .Text }}</a>
        {{- else }}
        <a class="success-btn portal-service-btn" href="{{ .URL }}">{{ .Text }}</a>
        {{- end }}
        {{- end }}
      </div>

      <div style="height:10px"></div>

      <div class="portal-actions">
        <form action="/logout" method="post">
          <button class="danger-btn" type="submit">Log out</button>
        </form>
        <form action="/mfa/enroll" method="get">
          <button class="ghost-btn" type="submit">Manage MFA</button>
        </form>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>
      <a href="https://github.com/modom-ofn/auth-portal" target="_blank" rel="noopener">AuthPortal</a>
      created by Modom. “Use at your own risk. This project is unaffiliated with {{ .ProviderName }}”.
    </p>
  </footer>
</body>
</html>
