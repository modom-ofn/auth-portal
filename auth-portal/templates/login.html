<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ .PageTitle }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="app-base-url" content="{{ .BaseURL }}">
  <link rel="icon" href="{{ .PortalLogoURL }}">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg {{.HeroBackgroundMode}}" style="--portal-bg-color: {{.HeroBackgroundColor}};">
  <main class="center">
    <section class="card {{.PortalCardMode}}" style="--portal-card-color: {{.PortalCardColor}};">
      <div class="brand">
        <img src="{{ .PortalLogoURL }}" alt="{{ .PortalAppName }}" class="logo portal-logo-image">
        <h1 style="color: {{ .PortalTitleColor }};">{{ .PortalAppName }}</h1>
        <p class="muted" style="color: {{ .PortalBodyTextColor }};">{{ .LoginBodyText }}</p>
      </div>

      <div style="display: flex; justify-content: center; align-items: center">
		  <button id="auth-signin" class="auth-btn {{.ProviderKey}}-btn" data-provider="{{.ProviderKey}}">
			{{ if eq .ProviderKey "plex" }}
			  <!-- Use a masked span so we can force pure black -->
			  <span class="plex-logo-mask" aria-hidden="true"></span>
			{{ else if eq .ProviderKey "jellyfin"}}
			  <img src="/static/jellyfin.svg" alt="{{ .ProviderName }} logo" />
			{{ else }}
			  <img src="/static/emby.svg" alt="{{ .ProviderName }} logo" />
			{{ end }}
			{{ if eq .ProviderKey "emby" }}Sign in with Emby
			{{ else if eq .ProviderKey "jellyfin" }}Sign in with Jellyfin
			{{ else }}Sign in with Plex{{ end }}
		  </button>
      </div>
    </section>
  </main>

  {{ if .ShowFooter }}
  <footer class="footer">
    <p><a href="https://github.com/modom-ofn/auth-portal" target="_blank" rel="noopener">AuthPortal</a> created by Modom. “Use at your own risk. This project is unaffiliated with {{.ProviderName}}”.</p>
  </footer>
  {{ end }}

  <script src="/static/login.js" defer></script>
</body>
</html>
