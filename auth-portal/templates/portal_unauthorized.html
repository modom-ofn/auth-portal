<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ .PageTitle }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="{{ .PortalLogoURL }}">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg {{.HeroBackgroundMode}}" style="--portal-bg-color: {{.HeroBackgroundColor}};">
  <main class="center">
    <section class="card {{.PortalCardMode}}" style="--portal-card-color: {{.PortalCardColor}};">
      <div class="brand">
        <img src="{{ .PortalLogoURL }}" alt="{{ .PortalAppName }}" class="logo portal-logo-image">
        <h1 style="color: {{ .PortalTitleColor }};">{{ .WelcomeTitle }}</h1>
        <p class="muted" style="color: {{ .PortalBodyTextColor }};">{{ .BodyText }}</p>
      </div>

      <div class="portal-actions portal-actions-inline">
        <span class="badge warn">{{.ProviderName}} Not Authorized</span>
        <!-- Optional: a CTA to request access -->
        {{- if .RequestEmail }}
        <a class="primary-btn" href="mailto:{{.RequestEmail}}?subject={{.RequestSubjectQP}}">Request Access</a>
        {{- end }}
      </div>

      <form action="/logout" method="post" class="portal-logout-form">
        <button class="danger-btn" type="submit">Log out</button>
      </form>
    </section>
  </main>

  {{ if .ShowFooter }}
  <footer class="footer">
    <p><a href="https://github.com/modom-ofn/auth-portal" target="_blank" rel="noopener">AuthPortal</a> created by Modom. “Use at your own risk. This project is unaffiliated with {{.ProviderName}}”.</p>
  </footer>
  {{ end }}
</body>
</html>
